defaults:
  - benchmark: example_dataset
  - override hydra/job_logging: none
  - _self_


main_agent:
  prompt_class: MainAgentPromptBoxedDeepSeek
  llm:
    provider_class: "DeepSeekOpenRouterClient"
    model_name: "deepseek-v4-pro"
    async_client: true
    temperature: 0.3
    top_p: 0.95
    min_p: 0.0
    top_k: -1
    reasoning_effort: high
    thinking_type: enabled
    max_tokens: 32000
    openrouter_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
    openrouter_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com}"
    openrouter_provider: null
    disable_cache_control: true
    keep_tool_result: -1
    oai_tool_thinking: false

  tool_config:
    - tool-reading
    - tool-searching

  max_turns: -1
  max_tool_calls_per_turn: 10

  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:HINT_LLM_BASE_URL,https://api.openai.com/v1}"
  output_process:
    final_answer_extraction: false
    final_answer_llm_base_url: "${oc.env:FINAL_ANSWER_LLM_BASE_URL,https://api.openai.com/v1}"

  openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
  add_message_id: true
  keep_tool_result: -1
  chinese_context: "${oc.env:CHINESE_CONTEXT,false}"


sub_agents: null


output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"

benchmark:
  openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
