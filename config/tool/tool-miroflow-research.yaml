name: "tool-miroflow-research"
tool_command: "python"
args:
  - "-m"
  - "src.tool.mcp_servers.miroflow_research_mcp_server"
env:
  MIROFLOW_MCP_CONFIG_NAME: "${oc.env:MIROFLOW_MCP_CONFIG_NAME,agent_hybrid_codex_deepseek}"
  MIROFLOW_MCP_OUTPUT_DIR: "${oc.env:MIROFLOW_MCP_OUTPUT_DIR,logs/mcp}"
  MIROFLOW_MCP_TIMEOUT: "${oc.env:MIROFLOW_MCP_TIMEOUT,3600}"
  MIROFLOW_MCP_LOGGER_LEVEL: "${oc.env:MIROFLOW_MCP_LOGGER_LEVEL,ERROR}"
  MIROFLOW_MCP_UV_CACHE_DIR: "${oc.env:MIROFLOW_MCP_UV_CACHE_DIR,''}"

  PATH: "${oc.env:PATH,''}"
  HOME: "${oc.env:HOME,''}"
  CODEX_COMMAND: "${oc.env:CODEX_COMMAND,codex}"
  CODEX_HOME: "${oc.env:CODEX_HOME,.local/codex-home}"
  CODEX_WORKDIR: "${oc.env:CODEX_WORKDIR,.}"
  CODEX_SANDBOX: "${oc.env:CODEX_SANDBOX,read-only}"
  CODEX_APPROVAL_POLICY: "${oc.env:CODEX_APPROVAL_POLICY,never}"
  CODEX_TIMEOUT: "${oc.env:CODEX_TIMEOUT,1800}"

  DEEPSEEK_API_KEY: "${oc.env:DEEPSEEK_API_KEY,''}"
  DEEPSEEK_BASE_URL: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com}"
  OPENAI_API_KEY: "${oc.env:OPENAI_API_KEY,dummy}"
  SERPER_API_KEY: "${oc.env:SERPER_API_KEY,''}"
  SERPER_BASE_URL: "${oc.env:SERPER_BASE_URL,https://google.serper.dev}"
  JINA_API_KEY: "${oc.env:JINA_API_KEY,''}"
  JINA_BASE_URL: "${oc.env:JINA_BASE_URL,https://r.jina.ai}"
  CHINESE_CONTEXT: "${oc.env:CHINESE_CONTEXT,false}"
  DATA_DIR: "${oc.env:DATA_DIR,data}"
