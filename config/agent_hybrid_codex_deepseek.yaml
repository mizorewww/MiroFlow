defaults:
  - benchmark: example_dataset
  - override hydra/job_logging: none
  - _self_


main_agent:
  prompt_class: MainAgentPromptHybridSearch
  llm:
    provider_class: "CodexCliClient"
    model_name: "gpt-5.5"
    async_client: true
    temperature: 1.0
    top_p: 1.0
    min_p: 0.0
    top_k: -1
    reasoning_effort: xhigh
    max_tokens: 128000
    openrouter_provider: null
    disable_cache_control: true
    keep_tool_result: -1
    oai_tool_thinking: false

    # Uses the local Codex CLI and the ignored symlink .local/codex-home.
    # No Codex tokens are copied into this repository.
    codex_command: "${oc.env:CODEX_COMMAND,codex}"
    codex_home: "${oc.env:CODEX_HOME,.local/codex-home}"
    codex_workdir: "${oc.env:CODEX_WORKDIR,.}"
    codex_sandbox: "${oc.env:CODEX_SANDBOX,read-only}"
    codex_approval_policy: "${oc.env:CODEX_APPROVAL_POLICY,never}"
    codex_timeout: "${oc.env:CODEX_TIMEOUT,1800}"
    codex_ephemeral: true
    codex_json_events: false
    codex_search: false

  # Keep the slow, high-quality model focused on planning and synthesis.
  # It can delegate web research to either Serper/Jina or Codex web_search.
  tool_config: []

  max_turns: 6
  max_tool_calls_per_turn: 2

  input_process:
    hint_generation: false
    hint_llm_base_url: "${oc.env:HINT_LLM_BASE_URL,https://api.openai.com/v1}"
    # system keeps --task as the user's pure question while preserving runtime guidance.
    # Use "none" to disable this extra guidance or "user" for legacy behavior.
    task_guidance_mode: system
  output_process:
    final_answer_extraction: false
    final_answer_llm_base_url: "${oc.env:FINAL_ANSWER_LLM_BASE_URL,https://api.openai.com/v1}"

  openai_api_key: "${oc.env:OPENAI_API_KEY,dummy}"
  add_message_id: true
  keep_tool_result: -1
  chinese_context: "${oc.env:CHINESE_CONTEXT,false}"


sub_agents:
  agent-worker:
    prompt_class: SubAgentWorkerPromptDeepSeek
    llm:
      provider_class: "DeepSeekOpenRouterClient"
      model_name: "deepseek-v4-pro"
      async_client: true
      temperature: 0.3
      top_p: 0.95
      min_p: 0.0
      top_k: -1
      reasoning_effort: high
      thinking_type: enabled
      max_tokens: 32000
      openrouter_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
      openrouter_base_url: "${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com}"
      openrouter_provider: null
      disable_cache_control: true
      keep_tool_result: -1
      oai_tool_thinking: false

    tool_config:
      - tool-reading
      - tool-searching

    max_turns: 4
    max_tool_calls_per_turn: 4

  agent-codex-search:
    prompt_class: SubAgentCodexWebSearchPrompt
    llm:
      provider_class: "CodexCliClient"
      model_name: "gpt-5.5"
      async_client: true
      temperature: 1.0
      top_p: 1.0
      min_p: 0.0
      top_k: -1
      reasoning_effort: xhigh
      max_tokens: 128000
      openrouter_provider: null
      disable_cache_control: true
      keep_tool_result: -1
      oai_tool_thinking: false
      codex_command: "${oc.env:CODEX_COMMAND,codex}"
      codex_home: "${oc.env:CODEX_HOME,.local/codex-home}"
      codex_workdir: "${oc.env:CODEX_WORKDIR,.}"
      codex_sandbox: "${oc.env:CODEX_SANDBOX,read-only}"
      codex_approval_policy: "${oc.env:CODEX_APPROVAL_POLICY,never}"
      codex_timeout: "${oc.env:CODEX_TIMEOUT,1800}"
      codex_ephemeral: true
      codex_json_events: false
      codex_search: true

    tool_config: []

    max_turns: 1
    max_tool_calls_per_turn: 1


output_dir: logs/
data_dir: "${oc.env:DATA_DIR,data}"

benchmark:
  openai_api_key: "${oc.env:DEEPSEEK_API_KEY,???}"
